<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KSGA Agent Map</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg:#0a0a0f; --panel:#15161c; --panel-2:#1c1e26; --fg:#d8d8e0;
    --fg-dim:#9a9aa6; --fg-mute:#6a6a76; --border:#2a2c36; --accent:#c9a84c;
    --agent:#8B6DAE; --vault:#5A8EAF; --planned:#6a6a76;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    background:var(--bg); color:var(--fg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    font-size:13px; overflow:hidden;
  }
  #wrap { display:grid; grid-template-columns:1fr 360px; height:100vh; }
  #left { position:relative; padding:18px 22px; overflow:auto; }
  h1 { font-size:15px; color:var(--accent); margin:0 0 2px; }
  .sub { color:var(--fg-dim); font-size:12px; margin-bottom:10px; }
  svg { width:100%; height:calc(100% - 60px); display:block; }
  .agent-node { cursor:pointer; }
  .agent-node:hover .box { stroke:var(--accent); }
  .box { fill:var(--panel-2); stroke:var(--border); stroke-width:1.2; rx:6; }
  .box.vault { fill:#16202c; stroke:var(--vault); }
  .box.planned { stroke-dasharray:4 3; }
  .ntitle { fill:var(--fg); font-size:12px; font-weight:600; }
  .nmeta { fill:var(--fg-mute); font-size:10px; }
  .edge { stroke:#3a3c46; stroke-width:1.2; fill:none; }
  .edge-label { fill:var(--fg-mute); font-size:9px; }
  #panel { background:var(--panel); border-left:1px solid var(--border); padding:18px; overflow-y:auto; }
  #panel h3 { color:var(--accent); margin:0 0 4px; font-size:14px; }
  #panel .meta { color:var(--fg-dim); font-size:11px; margin-bottom:12px; }
  #panel .row { margin-bottom:10px; }
  #panel .k { color:var(--fg-mute); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; }
  #panel .v { font-size:12.5px; line-height:1.45; }
  #panel .pill { display:inline-block; padding:1px 6px; border-radius:2px; background:var(--panel-2); margin:2px 4px 2px 0; font-size:11px; }
  .status-active { color:#5E9B76; }
  .status-planned { color:var(--fg-mute); }
</style>
</head>
<body>
<div id="wrap">
  <div id="left">
    <h1>Agent Map</h1>
    <div class="sub">The Keough wiki's agent ecosystem. Each agent runs headless (Claude Code), reads/writes a scoped slice of the vault, and commits to dev/tloughran for human review. Click an agent for detail.</div>
    <svg id="svg" viewBox="0 0 760 460" preserveAspectRatio="xMidYMid meet"></svg>
  </div>
  <div id="panel">
    <div id="panel-content"><div class="sub">Select an agent.</div></div>
  </div>
</div>

<script>
const VAULT = {x:380, y:230, w:150, h:54};
const AGENTS = {
  "weekly-update": {
    x:380, y:60, w:200, h:58, status:"active",
    title:"keough-wiki-weekly-update",
    schedule:"Weekly · Sun 06:00",
    scope:"Whole vault (read)",
    io:"Reads vault changes; writes a weekly summary to _meta.",
    owns:["_meta/Update Log.md (weekly section)"],
    edge:"summarize"
  },
  "title-verification": {
    x:610, y:230, w:210, h:58, status:"active",
    title:"keough-wiki-title-verification",
    schedule:"Monthly · 1st Sun 04:00",
    scope:"Faculty/ + Staff/ (person files)",
    io:"Discovers each person's canonical ND profile URL; monthly drift check on title/role.",
    owns:["canonical_profile_url","canonical_profile_status","_meta/Title Verification Report.md"],
    edge:"verify people"
  },
  "prs-formatter": {
    x:380, y:400, w:200, h:58, status:"active",
    title:"keough-wiki-prs-formatter",
    schedule:"Weekly · Sun 03:30",
    scope:"PRS/ (Problems/Resources/Solutions)",
    io:"Stamps each PRS file with explicit P:/R:/S: triple blocks for the PRS Explorer to parse.",
    owns:["PRS triple blocks","_meta/PRS Formatter Report.md"],
    edge:"stamp PRS"
  },
  "faculty-enrichment": {
    x:150, y:230, w:200, h:58, status:"planned",
    title:"keough-wiki-faculty-enrichment",
    schedule:"Planned",
    scope:"Faculty/ (person files)",
    io:"Writes a ~200-word principal-research-areas summary per faculty member, sourced from canonical_profile_url.",
    owns:["research_summary (frontmatter + body)"],
    edge:"enrich faculty"
  },
};

const svg = document.getElementById('svg');
const NS = "http://www.w3.org/2000/svg";
function el(tag, attrs, text) {
  const e = document.createElementNS(NS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (text != null) e.textContent = text;
  return e;
}
function cx(o){return o.x;} function cy(o){return o.y;}

// edges first
for (const id in AGENTS) {
  const a = AGENTS[id];
  const x1 = a.x, y1 = a.y, x2 = VAULT.x, y2 = VAULT.y;
  svg.appendChild(el('line', {class:'edge', x1, y1, x2, y2}));
  const mx = (x1+x2)/2, my = (y1+y2)/2;
  svg.appendChild(el('text', {class:'edge-label', x:mx, y:my-3, 'text-anchor':'middle'}, a.edge));
}
// vault node
function box(o, cls, title, meta) {
  const g = el('g', {});
  g.appendChild(el('rect', {class:'box '+cls, x:o.x-o.w/2, y:o.y-o.h/2, width:o.w, height:o.h, rx:6}));
  g.appendChild(el('text', {class:'ntitle', x:o.x, y:o.y-2, 'text-anchor':'middle'}, title));
  if (meta) g.appendChild(el('text', {class:'nmeta', x:o.x, y:o.y+13, 'text-anchor':'middle'}, meta));
  return g;
}
svg.appendChild(box(VAULT, 'vault', 'Keough Vault', 'dev/tloughran · 395 people'));
for (const id in AGENTS) {
  const a = AGENTS[id];
  const g = box(a, a.status==='planned'?'planned':'', a.title.replace('keough-wiki-',''), a.schedule);
  g.setAttribute('class','agent-node');
  g.style.cursor='pointer';
  g.addEventListener('click', ()=>showAgent(id));
  svg.appendChild(g);
}

function showAgent(id) {
  const a = AGENTS[id];
  const statusCls = a.status==='active'?'status-active':'status-planned';
  document.getElementById('panel-content').innerHTML = `
    <h3>${a.title}</h3>
    <div class="meta"><span class="${statusCls}">&#9679; ${a.status}</span> &middot; ${a.schedule}</div>
    <div class="row"><div class="k">Scope</div><div class="v">${a.scope}</div></div>
    <div class="row"><div class="k">What it does</div><div class="v">${a.io}</div></div>
    <div class="row"><div class="k">Owns</div><div class="v">${a.owns.map(o=>'<span class="pill">'+o+'</span>').join('')}</div></div>
  `;
}
showAgent('prs-formatter');
</script>
</body>
</html>
