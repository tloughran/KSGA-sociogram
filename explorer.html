<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>KSGA Explorer — Keough School of Global Affairs</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0a0a0f;
    --panel: #15161c;
    --panel-2: #1c1e26;
    --fg: #d8d8e0;
    --fg-dim: #9a9aa6;
    --fg-mute: #6a6a76;
    --border: #2a2c36;
    --accent: #c9a84c;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }
  #shell { display: grid; grid-template-rows: 50px 40px 1fr; height: 100vh; }
  #brandbar {
    display: flex; align-items: center; gap: 14px;
    padding: 0 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  #brandbar .mark { font-weight: 700; font-size: 15px; color: var(--accent); letter-spacing: 0.4px; }
  #brandbar .full { color: var(--fg-dim); font-size: 12px; }
  #brandbar .grow { flex: 1; }
  #brandbar a.src {
    color: var(--fg-mute); font-size: 11px; text-decoration: none;
    border: 1px solid var(--border); border-radius: 3px; padding: 3px 8px;
  }
  #brandbar a.src:hover { color: var(--accent); border-color: var(--accent); }
  #tabbar {
    display: flex; align-items: stretch;
    background: var(--panel-2);
    border-bottom: 1px solid var(--border);
    padding: 0 12px;
  }
  .tab {
    display: flex; align-items: center; gap: 6px;
    padding: 0 18px;
    font-size: 13px; color: var(--fg-dim);
    cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent;
    font-family: inherit;
  }
  .tab:hover { color: var(--fg); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .dot { width: 7px; height: 7px; border-radius: 50%; }
  #frame-wrap { position: relative; background: var(--bg); }
  iframe { width: 100%; height: 100%; border: none; display: block; }
  .tab.stub { color: var(--fg-mute); cursor: not-allowed; }
  .tab.stub:hover { color: var(--fg-mute); }
</style>
</head>
<body>
<div id="shell">
  <div id="brandbar">
    <span class="mark">KSGA Explorer</span>
    <span class="full">Keough School of Global Affairs — Community Accelerator Tools (PoC)</span>
    <span class="grow"></span>
    <a class="src" href="https://github.com/tloughran/KSGA-sociogram" target="_blank" rel="noopener">Source</a>
  </div>
  <div id="tabbar">
    <button class="tab active" data-src="index.html"><span class="dot" style="background:#5A8EAF"></span> Sociogram</button>
    <button class="tab" data-src="prs.html"><span class="dot" style="background:#7A6B8A"></span> PRS Coils</button>
    <button class="tab" data-src="agents.html"><span class="dot" style="background:#8B6DAE"></span> Agent Map</button>
    <button class="tab stub" title="Summa-specific in C2A2; no Keough analog yet">Curriculum Tools</button>
  </div>
  <div id="frame-wrap">
    <iframe id="content" src="index.html" title="content"></iframe>
  </div>
</div>
<script>
  const tabs = document.querySelectorAll('.tab[data-src]');
  const frame = document.getElementById('content');
  tabs.forEach(t => {
    t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      frame.src = t.getAttribute('data-src');
    });
  });
</script>
</body>
</html>
